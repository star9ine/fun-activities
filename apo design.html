<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.9);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 400px;
        position: relative;
    }

    h1 {
        color: #ff4d6d;
        margin-bottom: 10px;
    }

    p {
        color: #555;
        margin-bottom: 25px;
    }

    button {
        display: block;
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 12px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: #ff3355;
    }

    .heart {
        position: absolute;
        color: red;
        animation: float 3s linear forwards;
    }

    @keyframes float {
        0% {
            transform: translateY(0);
            opacity: 1;
        }
        100% {
            transform: translateY(-500px);
            opacity: 0;
        }
    }

    .hidden {
        display: none;
    }

    .final {
        font-size: 20px;
        color: #ff4d6d;
        font-weight: bold;
    }

</style>
</head>

<body>

<div class="container">
    <h1>Vidddhuuuu gaaaa.. ❤️</h1>
    <p>Click the buttons... I have something to tell you</p>

    <button onclick="showMessage(1)">Click me 🥺</button>
    <button onclick="showMessage(2)">Click again 💖</button>
    <button onclick="showMessage(3)">One more click 💕</button>

    <div id="message" style="margin-top:20px;"></div>
</div>

<script>

function showMessage(step) {

    createHearts();

    let message = document.getElementById("message");

    if(step === 1) {
        message.innerHTML = "I'm really sorry... I was working till 1AM 😔";
    }

    if(step === 2) {
        message.innerHTML = "I should have given you time... You matter more than work ❤️";
    }

    if(step === 3) {
        message.innerHTML = `
        <div class='final'>
        Viddhuu, I promise I'll give you more time 💕 <br><br>
        I won't work till 1AM again 🥺 <br><br>
        Please forgive me ra Vidddhhhuuu gaaa. ❤️
        </div>
        
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:15px;">
            <button onclick="forgiveYes()">Yes, I forgive ❤️</button>
            <button id="noBtn" onclick="forgiveNo()">No, I will not forgive 😤</button>
        </div>
        
        <div id="forgiveMessage" style="margin-top:15px;"></div>
        `;
    }
}

function forgiveYes() {
    document.getElementById('forgiveMessage').innerHTML = 
    "Thank you ra. I love you so much ra Vidddhhhuuu papaaa ❤️";
    createHearts();
}

function forgiveNo() {
    document.getElementById('forgiveMessage').innerHTML = 
    `Please ra Vidddhhuu gaaa, pweeaaasseeeee 🥺❤️ <br><br>
    Viddhhu ga forgive cheyu raa 💕 <br>
    Pweaaaseeee ❤️❤️❤️`;

    moveButton();
}

function moveButton() {
    const btn = document.getElementById('noBtn');
    btn.style.position = 'absolute';
    btn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
    btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
}

function createHearts() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3000);
}

setInterval(createHearts, 800);

</script>

</body>
</html>
